<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SSC Syllabus Tracker (Mobile)</title>
    <style>
        :root {
            --bg-color: #f1f2f6;
            --card-bg: #ffffff;
            --text-color: #2d3436;
            --border-color: #dfe6e9;
            --primary-purple: #6c5ce7;
            --primary-light: #a29bfe;
            --flag-red: #ff7675;
            --flag-yellow: #ffeaa7;
            --flag-green: #55efc4;
        }

        /* Mobile-first structural resetting */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 12px;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            text-align: center;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--primary-purple);
            margin: 5px 0;
        }

        p {
            font-size: 0.85rem;
            margin: 0;
            color: #636e72;
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Mobile Swipe/Scroll friendly Tab View */
        .tabs-nav {
            display: flex;
            background: #dfe6e9;
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 15px;
            gap: 2px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 5px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #555;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            text-align: center;
        }

        .tab-btn.active {
            background-color: var(--card-bg);
            color: var(--primary-purple);
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        /* Core Subject Container Window */
        .subject-card {
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
            padding: 15px;
            display: none;
        }

        .subject-card.active {
            display: flex;
            flex-direction: column;
        }

        .subject-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .subject-title {
            margin: 0;
            font-size: 1.2rem;
        }

        .baseline-badge {
            font-size: 0.85rem;
            background: var(--bg-color);
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: bold;
        }

        /* Global Toggle Controls */
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-color);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .toggle-switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #b2bec3; transition: .2s; border-radius: 20px;
        }

        .slider:before {
            position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px;
            background-color: white; transition: .2s; border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--primary-purple); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Input Block */
        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .input-group input {
            flex: 1;
            padding: 12px;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
        }

        .input-group button {
            background: var(--primary-purple);
            color: white;
            border: none;
            padding: 0 16px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Mobile Dynamic Topic List Layout */
        .topic-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .topic-item {
            display: flex;
            flex-direction: column;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            gap: 10px;
        }

        /* Color States */
        .status-untouched { background-color: var(--flag-red); border-color: #e17055; }
        .status-below-avg { background-color: var(--flag-yellow); border-color: #eccc68; }
        .status-good { background-color: var(--flag-green); border-color: #2ed573; }

        .topic-main-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .topic-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        .topic-name {
            font-weight: 600;
            font-size: 1rem;
            word-break: break-word;
        }

        .edit-input {
            font-size: 1rem;
            font-weight: 600;
            padding: 5px;
            border: 2px solid var(--primary-purple);
            border-radius: 6px;
            width: 80%;
            outline: none;
        }

        .action-icon-btn {
            background: transparent;
            border: none;
            font-size: 1.1rem;
            padding: 4px 8px;
            cursor: pointer;
        }

        /* Large, Easy-Touch Buttons for Mobile Practice Increments */
        .mobile-controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.4);
            padding: 6px;
            border-radius: 6px;
            gap: 4px;
        }

        .move-actions {
            display: flex;
            gap: 2px;
        }

        .btn-move {
            background: rgba(0, 0, 0, 0.05);
            border: none;
            padding: 6px 10px;
            font-size: 0.85rem;
            border-radius: 4px;
            font-weight: bold;
        }

        .q-counter-box {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: auto;
        }

        .btn-q {
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.15);
            min-width: 38px;
            height: 38px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .q-count {
            min-width: 45px;
            text-align: center;
            font-weight: bold;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>SSC Syllabus Tracker</h1>
        <p>Optimized for Mobile Touchscreens</p>
    </header>

    <div class="container">
        <div class="tabs-nav">
            <button class="tab-btn active" id="btn-tab-english" onclick="switchTab('english')">English</button>
            <button class="tab-btn" id="btn-tab-maths" onclick="switchTab('maths')">Maths</button>
            <button class="tab-btn" id="btn-tab-reasoning" onclick="switchTab('reasoning')">Reasoning</button>
            <button class="tab-btn" id="btn-tab-ga" onclick="switchTab('ga')">GA</button>
        </div>

        <div class="toggle-container">
            <span>Auto-Sort Priority Colors First</span>
            <label class="toggle-switch">
                <input type="checkbox" id="global-sort-toggle" onchange="toggleSort()">
                <span class="slider"></span>
            </label>
        </div>

        <div class="subject-card active" id="english-card">
            <div class="subject-header">
                <h2 class="subject-title">English</h2>
                <span class="baseline-badge" id="english-baseline">Avg: 0</span>
            </div>
            <div class="input-group">
                <input type="text" id="english-input" placeholder="Enter topic title...">
                <button onclick="addTopic('english')">+</button>
            </div>
            <ul class="topic-list" id="english-list"></ul>
        </div>

        <div class="subject-card" id="maths-card">
            <div class="subject-header">
                <h2 class="subject-title">Maths</h2>
                <span class="baseline-badge" id="maths-baseline">Avg: 0</span>
            </div>
            <div class="input-group">
                <input type="text" id="maths-input" placeholder="Enter topic title...">
                <button onclick="addTopic('maths')">+</button>
            </div>
            <ul class="topic-list" id="maths-list"></ul>
        </div>

        <div class="subject-card" id="reasoning-card">
            <div class="subject-header">
                <h2 class="subject-title">Reasoning</h2>
                <span class="baseline-badge" id="reasoning-baseline">Avg: 0</span>
            </div>
            <div class="input-group">
                <input type="text" id="reasoning-input" placeholder="Enter topic title...">
                <button onclick="addTopic('reasoning')">+</button>
            </div>
            <ul class="topic-list" id="reasoning-list"></ul>
        </div>

        <div class="subject-card" id="ga-card">
            <div class="subject-header">
                <h2 class="subject-title">General Awareness</h2>
                <span class="baseline-badge" id="ga-baseline">Avg: 0</span>
            </div>
            <div class="input-group">
                <input type="text" id="ga-input" placeholder="Enter topic title...">
                <button onclick="addTopic('ga')">+</button>
            </div>
            <ul class="topic-list" id="ga-list"></ul>
        </div>
    </div>

    <script>
        // Secure, Stable Core Data Model
        let trackerData = JSON.parse(localStorage.getItem('sscTrackerMobileData')) || {
            english: [], maths: [], reasoning: [], ga: []
        };

        let autoSortActive = JSON.parse(localStorage.getItem('sscTrackerMobileSort')) || false;
        let currentTab = 'english';

        function saveData() {
            localStorage.setItem('sscTrackerMobileData', JSON.stringify(trackerData));
            localStorage.setItem('sscTrackerMobileSort', JSON.stringify(autoSortActive));
        }

        function switchTab(subject) {
            currentTab = subject;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.subject-card').forEach(card => card.classList.remove('active'));

            document.getElementById(`btn-tab-${subject}`).classList.add('active');
            document.getElementById(`${subject}-card`).classList.add('active');
        }

        function toggleSort() {
            autoSortActive = document.getElementById('global-sort-toggle').checked;
            saveData();
            render();
        }

        function addTopic(subject) {
            const inputField = document.getElementById(`${subject}-input`);
            const name = inputField.value.trim();
            if (!name) return;

            // Simple validation tracking prevents duplicates safely
            if (trackerData[subject].some(t => t.name.toLowerCase() === name.toLowerCase())) {
                alert("This topic already exists!");
                return;
            }

            trackerData[subject].push({ name: name, questions: 0 });
            inputField.value = "";
            saveData();
            render();
        }

        function removeTopic(subject, index) {
            trackerData[subject].splice(index, 1);
            saveData();
            render();
        }

        function updateCount(subject, index, change) {
            trackerData[subject][index].questions += change;
            if (trackerData[subject][index].questions < 0) {
                trackerData[subject][index].questions = 0;
            }
            saveData();
            render();
        }

        // Fixed Inline Edit Loop targeting explicitly using local index array paths
        function startEdit(subject, index) {
            const textElement = document.getElementById(`text-${subject}-${index}`);
            const currentName = trackerData[subject][index].name;

            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'edit-input';
            input.value = currentName;

            const commitEdit = () => {
                const updatedTitle = input.value.trim();
                if (updatedTitle !== "") {
                    trackerData[subject][index].name = updatedTitle;
                    saveData();
                }
                render();
            };

            input.onblur = commitEdit;
            input.onkeydown = (e) => { if (e.key === 'Enter') commitEdit(); };

            textElement.replaceWith(input);
            input.focus();
        }

        // Tap-to-Move Positioning Logic
        function moveItem(subject, index, direction) {
            const targetIndex = index + direction;
            if (targetIndex < 0 || targetIndex >= trackerData[subject].length) return;

            // Swap element nodes inside data structure state array cleanly
            const temporary = trackerData[subject][index];
            trackerData[subject][index] = trackerData[subject][targetIndex];
            trackerData[subject][targetIndex] = temporary;

            saveData();
            render();
        }

        // Global Graphics Painting Engine
        function render() {
            const subjects = ['english', 'maths', 'reasoning', 'ga'];
            document.getElementById('global-sort-toggle').checked = autoSortActive;

            subjects.forEach(subject => {
                const listElement = document.getElementById(`${subject}-list`);
                const baselineElement = document.getElementById(`${subject}-baseline`);
                listElement.innerHTML = "";

                let topicsList = trackerData[subject];

                // Baseline math equation execution tracking
                let average = 0;
                if (topicsList.length > 0) {
                    const total = topicsList.reduce((sum, item) => sum + item.questions, 0);
                    average = total / topicsList.length;
                }
                baselineElement.innerText = `Avg: ${average.toFixed(1)}`;

                // Deep clone and store pointer references safely to isolate indexing bugs
                let outputItems = topicsList.map((item, idx) => ({ ...item, pointerIndex: idx }));

                if (autoSortActive) {
                    outputItems.sort((a, b) => {
                        const getWeight = (x) => (x.questions === 0 ? 0 : x.questions < average ? 1 : 2);
                        return getWeight(a) - getWeight(b);
                    });
                }

                outputItems.forEach((topic) => {
                    const li = document.createElement('li');
                    
                    // Style assignments
                    if (topic.questions === 0) li.className = "topic-item status-untouched";
                    else if (topic.questions < average) li.className = "topic-item status-below-avg";
                    else li.className = "topic-item status-good";

                    // Dynamic Mobile Layout Setup
                    li.innerHTML = `
                        <div class="topic-main-row">
                            <div class="topic-meta">
                                <span class="topic-name" id="text-${subject}-${topic.pointerIndex}">${topic.name}</span>
                                <button class="action-icon-btn" onclick="startEdit('${subject}', ${topic.pointerIndex})" style="color: #2c3e50;">✎</button>
                            </div>
                            <button class="action-icon-btn" onclick="removeTopic('${subject}', ${topic.pointerIndex})" style="color: #b2bec3;">🗑</button>
                        </div>
                        <div class="mobile-controls-row">
                            ${!autoSortActive ? `
                            <div class="move-actions">
                                <button class="btn-move" onclick="moveItem('${subject}', ${topic.pointerIndex}, -1)">▲</button>
                                <button class="btn-move" onclick="moveItem('${subject}', ${topic.pointerIndex}, 1)">▼</button>
                            </div>` : ''}
                            <div class="q-counter-box">
                                <button class="btn-q" onclick="updateCount('${subject}', ${topic.pointerIndex}, -5)">-5</button>
                                <button class="btn-q" onclick="updateCount('${subject}', ${topic.pointerIndex}, -1)">-</button>
                                <span class="q-count">${topic.questions}</span>
                                <button class="btn-q" onclick="updateCount('${subject}', ${topic.pointerIndex}, 1)">+</button>
                                <button class="btn-q" onclick="updateCount('${subject}', ${topic.pointerIndex}, 5)">+5</button>
                            </div>
                        </div>
                    `;
                    listElement.appendChild(li);
                });
            });
        }

        // Initialize display configuration state maps
        render();
    </script>
</body>
</html>
